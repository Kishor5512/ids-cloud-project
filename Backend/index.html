<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IDS Detection System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #333;
        }

        textarea {
            width: 80%;
            height: 150px;
            margin: 20px 0;
            padding: 10px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .attack {
            color: red;
        }

        .normal {
            color: green;
        }
    </style>
</head>
<body>

    <h1>🚨 IDS Detection System</h1>

    <p>Paste your JSON input below:</p>

    <textarea id="inputData">
{
  "features": [21,10335473,9,15,113,188,28,0,12.55,10.50,34,0,12.53,14.54,29.12,2.32,449368.39,1167105.43,3625393,3,6665665,833208.12,1534417.75,3373482,4,10300000,738239.57,1440663.90,3625393,3,0,0,0,0,296,488,0.87,1.45,0,34,12.04,12.90,166.54,0,0,0,1,0,0,0,0,1,12.54,12.55,12.53,296,0,0,0,0,0,0,9,113,15,188,29200,227,6,32,0,0,0,0,0,0,0,0]
}
    </textarea>

    <br>

    <button onclick="predict()">Predict</button>

    <div class="result" id="result"></div>

    <script>
async function predict() {
    const input = document.getElementById("inputData").value;
    const resultDiv = document.getElementById("result");

    try {
        resultDiv.innerHTML = "⏳ Waking server...";

        const parsedData = JSON.parse(input);

        const response = await fetch("https://ids-cloud-project.onrender.com/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(parsedData)
        });

        const data = await response.json();

        if (data.error) {
            resultDiv.innerHTML = "❌ Error: " + data.error;
            return;
        }

        resultDiv.innerHTML = `
            ✅ Prediction: ${data.prediction} <br>
            📊 Confidence: ${data.confidence}
        `;

    } catch (error) {
        console.error(error);
        resultDiv.innerHTML = "❌ " + error.message;
    }
}
</script>

</body>
</html>
